version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
      include: "scope"
    open-pull-requests-limit: 4
    groups:
      aws-sdk:
        patterns:
          - "github.com/aws/aws-sdk-go-v2*"
          - "github.com/aws/smithy-go"
      charmbracelet:
        patterns:
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
      spf13:
        patterns:
          - "github.com/spf13/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
