name: ci

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest

    steps:
      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6
        with:
          failOnWarnings: false
          failOnErrors: true
